name: Acceptance tests feedback trigger

# Trigger-only workflow for acceptance feedback comments.
# This workflow contains no privileged logic and is consumed via workflow_run.
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'java/**'
      - 'web/html/src/**'
      - 'testsuite/**'
      - '.github/workflows/acceptance_tests_sequential.yml'
      - '.github/workflows/acceptance_tests_parallel.yml'
      - '.github/workflows/acceptance_tests_feedback_comment.yml'
      - '.github/workflows/acceptance_tests_feedback_trigger.yml'
      - '.github/workflows/acceptance_tests_base.yml'
      - '!java/*.changes*'
      - '!testsuite/features/build_validation/**'

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-number

      - name: Upload PR metadata
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 #v5.0.0
        with:
          name: pr-metadata
          path: pr-number

      - run: echo "Acceptance tests feedback trigger workflow completed"
