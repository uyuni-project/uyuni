name: Insert Test Runs (cron)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  insert-test-runs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR workflow runs
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?event=pull_request&per_page=20" \
            > runs.json

      - name: Extract run IDs
        run: |
          jq -r '.workflow_runs[] 
            | select(.pull_requests | length > 0) 
            | "\(.id) \(.pull_requests[0].number)"' runs.json > parsed.txt

          sort -u parsed.txt -o parsed.txt

          echo "==== FINAL PARSED RUNS ===="
          cat parsed.txt
          echo "==========================="

      - name: Insert into DB
        run: |
          while read line; do
            RUN_ID=$(echo $line | awk '{print $1}')
            PR_NUMBER=$(echo $line | awk '{print $2}')

            echo "Processing PR $PR_NUMBER with run $RUN_ID"

            python insert_test_run_into_db.py \
              --run-id $RUN_ID \
              --pr-number $PR_NUMBER

          done < parsed.txt