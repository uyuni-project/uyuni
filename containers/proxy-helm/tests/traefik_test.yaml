suite: test global values parsing
templates:
  - templates/ingress.yaml
  - templates/traefik-routes.yaml
tests:
  - it: should create traefik resources with default traefik class
    set:
      global.config: |
        max_cache_size_mb: 2048
        server: parent.example.org
        proxy_fqdn: proxy.example.org
        email: foo@example.org
        log_level: 2
      global.httpd: "httpd_content: test httpd"
      global.ssh: "ssh_content: test ssh"
    release:
      namespace: proxy1
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.entrypoints: "websecure,web"
            traefik.ingress.kubernetes.io/router.tls.domains.n.main: "proxy.example.org"
        template: ingress.yaml
        documentSelector:
          path: metadata.name
          value: uyuni-proxy-ssl
      
      - equal:
          path: spec.ingressClassName
          value: traefik
        template: ingress.yaml
        documentSelector:
          path: metadata.name
          value: uyuni-proxy-ssl

  - it: should create traefik resources
    set:
      global.config: |
        max_cache_size_mb: 2048
        server: parent.example.org
        proxy_fqdn: proxy.example.org
        email: foo@example.org
        log_level: 2
      global.httpd: "httpd_content: test httpd"
      global.ssh: "ssh_content: test ssh"
      ingress:
        type: "traefik"
        class: "testClass"
        annotations:
          ssl:
            testAnnotation1: value1
            testAnnotation2: value2
    release:
      namespace: proxy1
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.entrypoints: "websecure,web"
            traefik.ingress.kubernetes.io/router.tls.domains.n.main: "proxy.example.org"
            testAnnotation1: value1
            testAnnotation2: value2
        template: ingress.yaml
        documentSelector:
          path: metadata.name
          value: uyuni-proxy-ssl
      
      - equal:
          path: spec.ingressClassName
          value: testClass
        template: ingress.yaml
        documentSelector:
          path: metadata.name
          value: uyuni-proxy-ssl

      - hasDocuments:
          count: 3
        template: traefik-routes.yaml

      # SSH router checks
      - contains:
          path: spec.routes[0].services
          content:
            name: ssh
            port: 8022
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: ssh-router

      - containsDocument:
          kind: IngressRouteTCP
          apiVersion: traefik.io/v1alpha1
          namespace: proxy1
          name: ssh-router
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: ssh-router

      # Salt publish router checks
      - contains:
          path: spec.routes[0].services
          content:
            name: salt
            port: 4505
          any: true
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-publish-router

      - containsDocument:
          kind: IngressRouteTCP
          apiVersion: traefik.io/v1alpha1
          namespace: proxy1
          name: salt-publish-router
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-publish-router

      # Salt request router checks
      - contains:
          path: spec.routes[0].services
          content:
            name: salt
            port: 4506
          any: true
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-request-router

      - containsDocument:
          kind: IngressRouteTCP
          apiVersion: traefik.io/v1alpha1
          namespace: proxy1
          name: salt-request-router
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-request-router

      # ingress.class annotation propagates to every IngressRouteTCP
      - equal:
          path: metadata.annotations["kubernetes.io/ingress.class"]
          value: testClass
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: ssh-router
      - equal:
          path: metadata.annotations["kubernetes.io/ingress.class"]
          value: testClass
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-publish-router
      - equal:
          path: metadata.annotations["kubernetes.io/ingress.class"]
          value: testClass
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-request-router

  - it: should render custom ingress.entryPoints into IngressRouteTCP specs
    set:
      global.config: |
        max_cache_size_mb: 2048
        server: parent.example.org
        proxy_fqdn: proxy.example.org
        email: foo@example.org
        log_level: 2
      global.httpd: "httpd_content: test httpd"
      global.ssh: "ssh_content: test ssh"
      ingress:
        entryPoints:
          ssh: "uyuni-ssh"
          saltPublish: "uyuni-publish"
          saltRequest: "uyuni-request"
    release:
      namespace: proxy1
    asserts:
      - equal:
          path: spec.entryPoints
          value:
            - uyuni-ssh
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: ssh-router
      - equal:
          path: spec.entryPoints
          value:
            - uyuni-publish
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-publish-router
      - equal:
          path: spec.entryPoints
          value:
            - uyuni-request
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-request-router

  - it: should render default ingress.entryPoints when not overridden
    set:
      global.config: |
        max_cache_size_mb: 2048
        server: parent.example.org
        proxy_fqdn: proxy.example.org
        email: foo@example.org
        log_level: 2
      global.httpd: "httpd_content: test httpd"
      global.ssh: "ssh_content: test ssh"
    release:
      namespace: proxy1
    asserts:
      - equal:
          path: spec.entryPoints
          value:
            - ssh
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: ssh-router
      - equal:
          path: spec.entryPoints
          value:
            - salt-publish
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-publish-router
      - equal:
          path: spec.entryPoints
          value:
            - salt-request
        template: traefik-routes.yaml
        documentSelector:
          path: metadata.name
          value: salt-request-router
