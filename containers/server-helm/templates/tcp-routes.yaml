{{- if .Values.gateway.enable }}
{{- $gatewayName := .Values.gateway.name | default "uyuni-gateway" -}}
{{- if ne (default .Values.services.type .Values.services.salt.type) "NodePort" }}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: salt-publish
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/part-of: uyuni
spec:
  parentRefs:
  - name: {{ $gatewayName }}
    sectionName: salt-publish
  rules:
    - backendRefs:
      - name: salt
        port: 4505
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: salt-request
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/part-of: uyuni
spec:
  parentRefs:
  - name: {{ $gatewayName }}
    sectionName: salt-request
  rules:
    - backendRefs:
      - name: salt
        port: 4506
{{- end }}
{{- if .Values.exposeJavaDebug }}
{{- if ne (default .Values.services.type .Values.services.taskomatic.type) "NodePort" }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tasko-debug
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/part-of: uyuni
spec:
  parentRefs:
  - name: {{ $gatewayName }}
    sectionName: tasko-debug
  rules:
    - backendRefs:
      - name: taskomatic
        port: 8001
{{- end }}
{{- if ne (default .Values.services.type .Values.services.search.type) "NodePort" }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: search-debug
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/part-of: uyuni
spec:
  parentRefs:
  - name: {{ $gatewayName }}
    sectionName: search-debug
  rules:
    - backendRefs:
      - name: search
        port: 8002
{{- end }}
{{- if ne (default .Values.services.type .Values.services.tomcat.type) "NodePort" }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tomcat-debug
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/part-of: uyuni
spec:
  parentRefs:
  - name: {{ $gatewayName }}
    sectionName: tomcat-debug
  rules:
    - backendRefs:
      - name: tomcat
        port: 8003
{{- end }}
{{- end }}
{{- end }}
