        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: "node"
                  operator: In
                  values:
                  - "db"
        tolerations:
        - key: "db"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.nodeName
          value: "db-node"
        template: db.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "node": "db"
        template: db.yaml
      - equal:
          path: spec.template.spec.affinity
          value:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: "node"
                    operator: In
                    values:
                    - "db"
        template: db.yaml
      - equal:
          path: spec.template.spec.tolerations
          value:
          - key: "db"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        template: db.yaml
      - isKind:
          of: Deployment
        template: db.yaml
      - isAPIVersion:
          of: apps/v1
        template: db.yaml
