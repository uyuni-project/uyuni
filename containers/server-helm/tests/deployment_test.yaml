suite: test server deployment
templates:
  - server.yaml
tests:
  - it: should render server deployment with default values
    set:
      global.fqdn: uyuni.example.com
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: uyuni
      - equal:
          path: spec.template.spec.containers[?(@.name=="uyuni")].image
          value: registry.opensuse.org/uyuni/server:latest
      - notContains:
          path: spec.template.spec.containers[?(@.name=="uyuni")].env
          content:
            name: DEBUG_LONG_START
            value: "y"

  - it: should override image when values.images is provided
    set:
      global.fqdn: uyuni.example.com
      server:
        image: my-custom-registry/uyuni-server
        tag: 5.0.0
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="uyuni")].image
          value: my-custom-registry/uyuni-server:5.0.0

  - it: should use the registry credentials if set
    set:
      global.fqdn: uyuni.example.com
      registrySecret: mycreds
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: mycreds

  - it: should render extra server volumes and volume mounts
    set:
      global.fqdn: uyuni.example.com
      server:
        extraVolumes:
          - name: uyuni-bench-source
            persistentVolumeClaim:
              claimName: uyuni-bench-source
        extraVolumeMounts:
          - name: uyuni-bench-source
            mountPath: /uyuni-bench-source
            readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: uyuni-bench-source
            persistentVolumeClaim:
              claimName: uyuni-bench-source
      - contains:
          path: spec.template.spec.containers[?(@.name=="uyuni")].volumeMounts
          content:
            name: uyuni-bench-source
            mountPath: /uyuni-bench-source
            readOnly: true

  - it: should use the SCC credentials if set
    set:
      global.fqdn: uyuni.example.com
      server:
        sccSecret: myscccreds
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="uyuni")].env
          content:
            name: SCC_USER
            valueFrom:
              secretKeyRef:
                key: username
                name: myscccreds
                optional: false

      - contains:
          path: spec.template.spec.containers[?(@.name=="uyuni")].env
          content:
            name: SCC_PASS
            valueFrom:
              secretKeyRef:
                key: password
                name: myscccreds
                optional: false

  - it: should mark the custom-cas projected source as optional
    set:
      global.fqdn: uyuni.example.com
    asserts:
      - equal:
          path: spec.template.spec.volumes[?(@.name=="trust-anchors")].projected.sources[?(@.configMap.name=="custom-cas")].configMap.optional
          value: true

  - it: should mount the trust-anchors projected volume read-only at /etc/pki/trust/anchors/
    set:
      global.fqdn: uyuni.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="uyuni")].volumeMounts
          content:
            mountPath: /etc/pki/trust/anchors/
            name: trust-anchors
            readOnly: true

  - it: should declare the trust-anchors projected volume aggregating uyuni-ca, db-ca and custom-cas
    set:
      global.fqdn: uyuni.example.com
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: trust-anchors
            projected:
              defaultMode: 420
              sources:
                - configMap:
                    name: uyuni-ca
                    items:
                      - key: ca.crt
                        path: LOCAL-RHN-ORG-TRUSTED-SSL-CERT
                - configMap:
                    name: db-ca
                    items:
                      - key: ca.crt
                        path: DB-RHN-ORG-TRUSTED-SSL-CERT
                - configMap:
                    name: custom-cas
                    optional: true

  - it: should not declare the removed ca-certs volume in the deployment
    set:
      global.fqdn: uyuni.example.com
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: ca-certs
            persistentVolumeClaim:
              claimName: ca-certs
