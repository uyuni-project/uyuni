apiVersion: batch/v1
kind: Job
metadata:
  name: uyuni-locust-template
  namespace: default
  labels:
    app.kubernetes.io/name: benchmark-phase3
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: benchmark-phase3
    spec:
      restartPolicy: Never
      containers:
        - name: locust
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              echo "Template job. Actual commands are injected by scripts/run_uyuni_workloads.sh"
