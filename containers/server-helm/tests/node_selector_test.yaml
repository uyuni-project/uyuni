# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test node selection
templates:
  - server.yaml
  - db.yaml
  - tftp.yaml
  - coco.yaml
  - saline.yaml
  - hub.yaml
tests:
  - it: check node selector on server
    set:
      global:
        fqdn: "test.example.com"
      server:
        nodeName: "node-42"
        nodeSelector:
          "kubernetes.io/hostname": "node-42"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: "kubernetes.io/hostname"
                  operator: In
                  values:
                  - "node-42"
        tolerations:
        - key: "key"
          operator: "Equal"
          value: "value"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.nodeName
          value: "node-42"
        template: server.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "kubernetes.io/hostname": "node-42"
        template: server.yaml
      - equal:
          path: spec.template.spec.affinity
          value:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: "kubernetes.io/hostname"
                    operator: In
                    values:
                    - "node-42"
        template: server.yaml
      - equal:
          path: spec.template.spec.tolerations
          value:
          - key: "key"
            operator: "Equal"
            value: "value"
            effect: "NoSchedule"
        template: server.yaml
      - isKind:
          of: Deployment
        template: server.yaml
      - isAPIVersion:
          of: apps/v1
        template: server.yaml
      - isNull:
          path: spec.template.spec.topologySpreadConstraints
        template: server.yaml
  - it: check node selector on db
    set:
      global:
        fqdn: "test.example.com"
      db:
        nodeName: "db-node"
        nodeSelector:
