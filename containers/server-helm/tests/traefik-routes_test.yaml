suite: test ingress providers
templates:
  - traefik-routes.yaml
tests:
  - it: should route db and salt ports with traefik ingress
    set:
      global.fqdn: uyuni.example.com
      ingress:
        type: "traefik"
    asserts:
      - equal:
          path: spec.routes[0].services[0].port
          value: 4506
        documentSelector:
          path: metadata.name
          value: salt-request-route
      - equal:
          path: spec.routes[0].services[0].port
          value: 4505
        documentSelector:
          path: metadata.name
          value: salt-publish-route
      - hasDocuments:
          count: 0
        documentSelector:
          path: metadata.name
          value: tomcat-debug-route
          skipEmptyTemplates: true
      - hasDocuments:
          count: 0
        documentSelector:
          path: metadata.name
          value: search-debug-route
          skipEmptyTemplates: true
      - hasDocuments:
          count: 0
        documentSelector:
          path: metadata.name
          value: tasko-debug-route
          skipEmptyTemplates: true
  
  - it: should route debug ports with traefik ingress and java debugging
    set:
      global.fqdn: uyuni.example.com
      ingress:
        type: "traefik"
      exposeJavaDebug: true
    asserts:
      - equal:
          path: spec.routes[0].services[0].port
          value: 8003
        documentSelector:
          path: metadata.name
          value: tomcat-debug-route
      - equal:
          path: spec.routes[0].services[0].port
          value: 8002
        documentSelector:
          path: metadata.name
          value: search-debug-route
      - equal:
          path: spec.routes[0].services[0].port
          value: 8001
        documentSelector:
          path: metadata.name
          value: tasko-debug-route
