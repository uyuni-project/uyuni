{{- if .Values.gateway.enable }}
{{- $config := .Values.global.config | fromYaml }}
{{- $gatewayName := .Values.gateway.name | default "uyuni-gateway" -}}

# HTTPS Routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxy-routes
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/part-of: uyuni
    app.kubernetes.io/component: proxy
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.gateway.listeners.https.name }}
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.gateway.listeners.http.name }}
  hostnames:
    - {{ $config.proxy_fqdn | quote }}
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: web
          port: 80
{{- end }}


