  - it: check global node placement fallback
    set:
      global:
        fqdn: "test.example.com"
      placement:
        nodeName: "global-fallback-node"
        nodeSelector:
          "tier": "global"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: "tier"
                  operator: In
                  values:
                  - "global"
        tolerations:
        - key: "global"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.nodeName
          value: "global-fallback-node"
        template: server.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "tier": "global"
        template: server.yaml
      - equal:
          path: spec.template.spec.affinity
          value:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: "tier"
                    operator: In
                    values:
                    - "global"
        template: server.yaml
      - equal:
          path: spec.template.spec.tolerations
          value:
          - key: "global"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        template: server.yaml
      - equal:
          path: spec.template.spec.nodeName
          value: "global-fallback-node"
        template: db.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "tier": "global"
        template: db.yaml
      - equal:
          path: spec.template.spec.nodeName
          value: "global-fallback-node"
        template: tftp.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "tier": "global"
        template: tftp.yaml
  - it: check local override takes precedence over placement defaults
    set:
      global:
        fqdn: "test.example.com"
      placement:
        nodeName: "default-node"
        nodeSelector:
          "tier": "default"
        tolerations:
        - key: "default"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      server:
        nodeName: "server-override-node"
        nodeSelector:
          "tier": "server-only"
        tolerations:
        - key: "server"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
    asserts:
      # Server should use its own overrides
      - equal:
          path: spec.template.spec.nodeName
          value: "server-override-node"
        template: server.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "tier": "server-only"
        template: server.yaml
      - equal:
          path: spec.template.spec.tolerations
          value:
          - key: "server"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        template: server.yaml
      # DB should still use the placement defaults
      - equal:
          path: spec.template.spec.nodeName
          value: "default-node"
        template: db.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            "tier": "default"
        template: db.yaml
      - equal:
          path: spec.template.spec.tolerations
          value:
          - key: "default"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        template: db.yaml
