suite: test monitoring and debug ports
templates:
  - server.yaml
  - services.yaml
tests:
  - it: should include monitoring and base ports by default
    set:
      global.fqdn: uyuni.example.com
      enableMonitoring: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9187
        template: server.yaml
        documentSelector:
          path: metadata.name
          value: uyuni
      - contains:
          path: spec.ports
          content:
            name: jmx
            port: 5557
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic-internal
      # Test Database Service Ports
      - contains:
          path: spec.ports
          content:
            name: pgsql
            port: 5432
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: db
      - contains:
          path: spec.ports
          content:
            name: pgsql
            port: 5432
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: reportdb

  - it: should remove monitoring ports when disabled
    set:
      global.fqdn: uyuni.example.com
      enableMonitoring: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9187
        template: server.yaml
        documentSelector:
          path: metadata.name
          value: uyuni
      - hasDocuments:
          count: 0
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic
          skipEmptyTemplates: true

  - it: should keep taskomatic service if monitoring is off but debug is on
    set:
      global.fqdn: uyuni.example.com
      enableMonitoring: false
      exposeJavaDebug: true
    asserts:
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8001
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic

      - hasDocuments:
          count: 0
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic-internal
          skipEmptyTemplates: true

  - it: should set the default ports with global NodePort type
    set:
      global.fqdn: uyuni.example.com
      exposeJavaDebug: true
      services:
        type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: reportdb
      - contains:
          path: spec.ports
          content:
            name: pgsql
            port: 5432
            nodePort: 30032
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: reportdb

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: salt
      - contains:
          path: spec.ports
          content:
            name: publish
            port: 4505
            nodePort: 30005
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: salt
      - contains:
          path: spec.ports
          content:
            name: request
            port: 4506
            nodePort: 30006
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: salt

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: search
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8002
            nodePort: 30002
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: search

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8001
            nodePort: 30001
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: tomcat
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8003
            nodePort: 30003
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: tomcat

  - it: should set the ports with overridden values NodePort type
    set:
      global.fqdn: uyuni.example.com
      exposeJavaDebug: true
      services:
        reportdb:
          type: NodePort
          ports:
            pgsql: 30001
        salt:
          type: NodePort
          ports:
            publish: 30002
            request: 30003
        search:
          type: NodePort
          ports:
            debug: 30004
        taskomatic:
          type: NodePort
          ports:
            debug: 30005
        tomcat:
          type: NodePort
          ports:
            debug: 30006
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: reportdb
      - contains:
          path: spec.ports
          content:
            name: pgsql
            port: 5432
            nodePort: 30001
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: reportdb

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: salt
      - contains:
          path: spec.ports
          content:
            name: publish
            port: 4505
            nodePort: 30002
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: salt
      - contains:
          path: spec.ports
          content:
            name: request
            port: 4506
            nodePort: 30003
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: salt

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: search
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8002
            nodePort: 30004
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: search

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8001
            nodePort: 30005
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: taskomatic

      - equal:
          path: spec.type
          value: NodePort
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: tomcat
      - contains:
          path: spec.ports
          content:
            name: debug
            port: 8003
            nodePort: 30006
        template: services.yaml
        documentSelector:
          path: metadata.name
          value: tomcat
