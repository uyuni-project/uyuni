name: Checksum checks

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'containers/mlm-supportconfig/kubectl-mlm_supportconfig*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Validate the checksums
        run: |
          cd containers/mlm-supportconfig
          sha512sum -c kubectl-mlm_supportconfig.sha512
