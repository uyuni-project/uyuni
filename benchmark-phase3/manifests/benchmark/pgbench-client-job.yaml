apiVersion: batch/v1
kind: Job
metadata:
  name: pgbench-client-template
  namespace: default
  labels:
    app.kubernetes.io/name: benchmark-phase3
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: benchmark-phase3
    spec:
      restartPolicy: Never
      containers:
        - name: pgbench-client
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              value: ""
          command:
            - bash
            - -lc
            - |
              echo "Template job. Actual commands are injected by scripts/run_pgbench_matrix.sh"
