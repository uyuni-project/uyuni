  - it: check node selector on hub
    set:
      global:
        fqdn: "test.example.com"
      hubAPI:
        enable: true
        nodeName: "hub-node"
        nodeSelector:
          "node": "hub"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
